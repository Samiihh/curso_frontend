<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 06 - Galeria Responsiva</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Div que centraliza toda a galeria -->
    <div class="gallery-container">
      <h1>Galeria de Viagens</h1>

      <!-- Grid da Galeria -->
      <!-- Container flex  que usa o flex-wrap para cria um grid responsivel,  usando flexbox 
         -->
      <div class="grid">
        <!-- Item 1 -->
        <div class="item">
          <!-- Imagem do item -->
          <img src="./img/paris.png" alt="Paris" />
          <!-- Overlay : (Camada de texto sobre a imagem) -->
          <div class="overlay">Paris</div>
        </div>
        <!-- Item 2 -->
        <div class="item">
            <img src="./img/maldivas.png" alt="maldivas">
            <div class="overlay">Maldivas</div>
        </div>
        <!-- Item 3 -->
        <div class="item">
            <img src="./img/orlando.png" alt="">
            <div class="overlay">The Wizarding World of Harry Potter</div>
        </div>
        <!-- Item 4 -->
        <div class="item">
            <img src="./img/dubai.png" alt="Dubai">
            <div class="overlay">Dubai</div>
        </div>

        <!-- Item 5 -->
        <div class="item">
            <img src="./img/italia.png" alt="Itália">
            <div class="overlay">Itália</div>
        </div>
        <!-- Item 6 -->
         
        <div class="item">
            <img src="./img/alpes-suicos.png" alt="Alpes Suiços">
            <div class="overlay">Alpes Suiços</div>
        </div>
      </div> <!--Fim da div Grid-->
    </div>
  </body>
</html>
