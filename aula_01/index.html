<!doctype html>
<!-- Declaracao do tipo de documento HTML5 -->
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <!-- Define a codificação de caracteres como UTF-8 para suportar acentos e símbolos -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Controla o comportamento de visualização em dispositivos móveis -->
    <title>Aula 01 - Pagina de boas Vindas</title>
    <!-- Título exibido na aba do navegador -->
    <!-- Link que liga a pagina html ao arquivo css e aplica os estilos visuais -->
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <!-- O corpo da página contém todo o conteúdo visível ao usuário -->
    <!-- O uso de tags semânticas ajuda acessibilidade e SEO. -->
    <header>
      <!-- Cabeçalho da página: fornece título e contexto inicial. -->
      <h1>Bem-vindos ao Nosso Curso!</h1>
    </header>

    <main>
      <!-- Imagem principal de boas-vindas. -->
      <!-- src define o caminho do arquivo no projeto. -->
      <!-- alt é o texto alternativo para leitores de tela e se a imagem não carregar. -->
      <img src="./img/boas-vindas-do-vetor-da-luz-de-neon-azul-do-quadro-no-design-de-sobreposicao-azul-escuro-fundo-de-tecnologia-futurista_178863-1088.avif" alt="Imagem de boas vindas">

      <!-- Parágrafo explicativo sobre o curso. -->
      <p>Estamos muito felizes em ter você aqui. Prepare-se para mergulhar no mundo do desenvolvimento web!</p>

      <!-- Link de ação. Alterar href para o destino real quando houver uma página de destino. -->
      <a class="button" href="#">Começar Agora</a>
    </main>

    <footer>
      <!-- Rodapé da página para informações secundárias e copyright. -->
      <p>&copy; 2026 Desenvolver Web Front-end</p>
    </footer>
  </body>
</html>
